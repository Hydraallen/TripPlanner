services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://tripplanner:tripplanner@postgres:5432/tripplanner
      - OPENTRIPMAP_API_KEY=${OPENTRIPMAP_API_KEY}
      - AMAP_API_KEY=${AMAP_API_KEY}
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-glm-5.1}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tripplanner
      POSTGRES_PASSWORD: tripplanner
      POSTGRES_DB: tripplanner
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripplanner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
